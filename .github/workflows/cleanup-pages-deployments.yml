name: Cleanup Pages Deployments

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/cleanup-pages-deployments.yml

permissions:
  contents: read
  deployments: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete github-pages deployments
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_API_VERSION: "2022-11-28"
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GH_REPO"]
          token = os.environ["GH_TOKEN"]
          api_version = os.environ["GH_API_VERSION"]
          base = f"https://api.github.com/repos/{repo}"

          def request(method, url, data=None):
              body = None
              if data is not None:
                  body = json.dumps(data).encode("utf-8")
              req = urllib.request.Request(url, data=body, method=method)
              req.add_header("Accept", "application/vnd.github+json")
              req.add_header("Authorization", f"Bearer {token}")
              req.add_header("X-GitHub-Api-Version", api_version)
              if data is not None:
                  req.add_header("Content-Type", "application/json")
              with urllib.request.urlopen(req) as response:
                  text = response.read().decode("utf-8")
                  return json.loads(text) if text else None

          deployments = request(
              "GET",
              f"{base}/deployments?environment=github-pages&per_page=100",
          )
          print(f"Found {len(deployments)} github-pages deployment(s).")

          for deployment in deployments:
              deployment_id = deployment["id"]
              print(f"Marking deployment {deployment_id} inactive.")
              request(
                  "POST",
                  f"{base}/deployments/{deployment_id}/statuses",
                  {"state": "inactive", "description": "Cleaning up template source repository deployment history."},
              )
              print(f"Deleting deployment {deployment_id}.")
              request("DELETE", f"{base}/deployments/{deployment_id}")

          print("Deployment cleanup complete.")
          PY
